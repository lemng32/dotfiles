[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.surface1}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5

format-volume-prefix = " | " 
format-muted-prefix = " | "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
format-muted = <label-muted>

label-volume = ${env:VOLUME_LABEL}
label-muted = ${env:VOLUME_LABEL_MUTED}

[module/backlight]
type = internal/backlight

format-prefix = " | "
format = <label>

label = ${env:BACKLIGHT_LABEL}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/battery]
type = internal/battery

adapter = AC
poll-interval = 5

format-full-prefix = " | "
format-full = <ramp-capacity> <label-full>
label-full = ${env:BAT_LABEL_FULL}

format-charging-prefix = " | "
format-charging = <label-charging>
label-charging = ${env:BAT_LABEL_CHARGING}

format-discharging-prefix = " | "
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = ${env:BAT_LABEL_DISCHARGING}

ramp-capacity-0 = ${env:BAT_RAMP_CAP_0}
ramp-capacity-1 = ${env:BAT_RAMP_CAP_1} 
ramp-capacity-2 = ${env:BAT_RAMP_CAP_2} 
ramp-capacity-3 = ${env:BAT_RAMP_CAP_3} 
ramp-capacity-4 = ${env:BAT_RAMP_CAP_4} 

[module/bat0]
inherit = module/battery
battery = BAT0

[module/bat1]
inherit = module/battery
battery = BAT1

[module/network]
type = internal/network

interface = wlp3s0
interface-type = wireless

interval = 5.0

format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>

label-connected = ${env:NETWORK_LABEL_CONNECTED}
label-disconnected = ${env:NETWORK_LABEL_DISCONNECTED}

ramp-signal-0 = ${env:NETWORK_RAMP_SIG_0}
ramp-signal-1 = ${env:NETWORK_RAMP_SIG_1}
ramp-signal-2 = ${env:NETWORK_RAMP_SIG_2}
ramp-signal-3 = ${env:NETWORK_RAMP_SIG_3}
ramp-signal-4 = ${env:NETWORK_RAMP_SIG_4}

[module/tray]
type = internal/tray

tray-position = right
tray-size = 53%
tray-spacing = 20px

tray-foreground = #F0C674

wm-restack = i3
override-redirect = true

[module/date]
type = internal/date
interval = 1

date = [ %H:%M ]
date-alt = [ %m-%d-%y %H:%M:%S ]

label = %date%
label-foreground = ${colors.primary}
