[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.surface1}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5

format-volume-prefix = " | " 
format-muted-prefix = " | "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
format-muted = <label-muted>

label-volume =  %{T2}%percentage%%%{T-}

label-muted =  %{T2}Muted%{T-}

[module/backlight]
type = internal/backlight

format-prefix = "| "
format = <label>

label = 󰃠 %{T2}%percentage%%%{T-}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/battery]
type = internal/battery

adapter = AC
poll-interval = 5

format-full-prefix = " | "
format-full = <ramp-capacity> %{T1}<label-full>%{T-}
label-full = %percentage%%

format-charging-prefix = " | "
format-charging = <label-charging>
label-charging = 󰂄 %{T2}%percentage%%%{T-}

format-discharging-prefix = " | "
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %{T2}%percentage%%%{T-}

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂁
ramp-capacity-4 = 󰁹

[module/bat0]
inherit = module/battery
battery = BAT0

[module/bat1]
inherit = module/battery
battery = BAT1

[module/network]
type = internal/network
interface-type = wireless
interval = 3.0

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = "cac"
label-disconnected = "cac"

[module/tray]
type = internal/tray

tray-position = right
tray-size = 53%
tray-spacing = 20px

tray-foreground = #F0C674

wm-restack = i3
override-redirect = true

[module/date]
type = internal/date
interval = 1

date = [ %H:%M ]
date-alt = [ %m-%d-%y %H:%M:%S ]

label = %date%
label-foreground = ${colors.primary}
